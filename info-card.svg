<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480">
<defs>
  <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#0a0e14"/>
  </linearGradient>
</defs>
<style>
  @keyframes fi { 0%{opacity:0;transform:translateX(-15px)} 100%{opacity:1;transform:translateX(0)} }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  @keyframes orbit { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
</style>

<!-- Background -->
<rect width="860" height="480" rx="12" fill="url(#bg-grad)"/>

<!-- Terminal chrome -->
<rect width="860" height="36" rx="12" fill="#161b22"/>
<rect y="28" width="860" height="8" fill="#161b22"/>
<circle cx="22" cy="18" r="6" fill="#ff5f57"/><circle cx="42" cy="18" r="6" fill="#febc2e"/><circle cx="62" cy="18" r="6" fill="#28c840"/>
<text x="430" y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="12" fill="#8b949e">afnaan@github — system profiler</text>

<!-- ASCII Brain Art (hand-crafted) -->
<g opacity="0" style="animation: fi 0.5s 0.3s forwards;" filter="url(#glow)">
  <text x="30" y="68" font-family="'Courier New',monospace" font-size="10" fill="#00e5ff" opacity="0.9">
    <tspan x="30" dy="0">          ████████████████</tspan>
    <tspan x="30" dy="12">       ██▓▓▓▓▓▓▒▒▒▒▒▒▒▒▓▓██</tspan>
    <tspan x="30" dy="12">     ██▓▓▓▒▒░░░░░░░░░░▒▒▓▓▓██</tspan>
    <tspan x="30" dy="12">    █▓▓▒░░  NEURAL  ░░░▒▒▓▓▓█</tspan>
    <tspan x="30" dy="12">   █▓▒░░  NETWORK  ░░░▒▒▒▓▓▓█</tspan>
    <tspan x="30" dy="12">   █▓▒░  ACTIVATED  ░░░▒▒▓▓▓█</tspan>
    <tspan x="30" dy="12">   █▓▓▒░░░░░░░░░░░░░░▒▒▓▓▓▓█</tspan>
    <tspan x="30" dy="12">    █▓▓▓▒▒░░░░░░░░▒▒▒▓▓▓▓██</tspan>
    <tspan x="30" dy="12">     ██▓▓▓▓▒▒▒▒▒▒▒▒▓▓▓▓██</tspan>
    <tspan x="30" dy="12">       ████████████████</tspan>
    <tspan x="30" dy="12">          ║║    ║║</tspan>
    <tspan x="30" dy="12">     ═════╩╩════╩╩═════</tspan>
  </text>
</g>

<!-- Neofetch data — right side -->
<g font-family="'Courier New',monospace" font-size="13">
  <!-- Line 1: Name -->
