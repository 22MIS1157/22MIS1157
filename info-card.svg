    <text x="280" y="180" fill="#bf5af2" font-weight="bold">Now</text>
    <text x="340" y="180" fill="#8b949e">~</text>
    <text x="360" y="180" fill="#39d353">Research Intern @ CHAIR, VIT</text>
  </g>
  <g opacity="0" style="animation: fi 0.4s 1.2s forwards;">
