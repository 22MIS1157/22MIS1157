    <rect x="280" y="435" width="18" height="18" rx="3" fill="#ff5f57"/>
    <rect x="304" y="435" width="18" height="18" rx="3" fill="#febc2e"/>
    <rect x="328" y="435" width="18" height="18" rx="3" fill="#28c840"/>
    <rect x="352" y="435" width="18" height="18" rx="3" fill="#00e5ff"/>
    <rect x="376" y="435" width="18" height="18" rx="3" fill="#bf5af2"/>
    <rect x="400" y="435" width="18" height="18" rx="3" fill="#f0883e"/>
    <rect x="424" y="435" width="18" height="18" rx="3" fill="#ff7b72"/>
    <rect x="448" y="435" width="18" height="18" rx="3" fill="#79c0ff"/>
  </g>
</g>

<!-- Blinking cursor at bottom -->
<rect x="280" y="462" width="8" height="14" fill="#00e5ff" style="animation: blink 1s step-end infinite;" opacity="0">
  <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.6s" fill="freeze"/>
</rect>

<!-- Pulsing dots on the brain art -->
<circle cx="100" cy="100" r="2" fill="#00e5ff" style="animation: pulse 2s 1s ease-in-out infinite;"/>
<circle cx="130" cy="85" r="1.5" fill="#bf5af2" style="animation: pulse 2s 1.5s ease-in-out infinite;"/>
<circle cx="85" cy="130" r="1.5" fill="#39d353" style="animation: pulse 2s 2s ease-in-out infinite;"/>
<circle cx="145" cy="140" r="2" fill="#ff7b72" style="animation: pulse 2s 0.5s ease-in-out infinite;"/>

<!-- Border -->
<rect width="860" height="480" rx="12" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>