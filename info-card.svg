  <g opacity="0" style="animation: fi 0.4s 2.1s forwards;">
    <text x="280" y="364" fill="#39d353" font-weight="bold">▸</text>
    <text x="298" y="364" fill="#e6edf3">AI Anemia Detection — 96% acc, AUC 0.98</text>
  </g>
  <g opacity="0" style="animation: fi 0.4s 2.2s forwards;">
    <text x="280" y="382" fill="#39d353" font-weight="bold">▸</text>
    <text x="298" y="382" fill="#e6edf3">ICU Mortality Predictor — 96% AUC-ROC</text>
  </g>
  <g opacity="0" style="animation: fi 0.4s 2.3s forwards;">
    <text x="280" y="400" fill="#39d353" font-weight="bold">▸</text>
    <text x="298" y="400" fill="#e6edf3">ATCC VPark — IoT + YOLOv8 + Arduino</text>
  </g>
  <g opacity="0" style="animation: fi 0.4s 2.4s forwards;">
