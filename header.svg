<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-strong">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0"/>
    <stop offset="50%" style="stop-color:#00e5ff;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:0"/>
  </linearGradient>
  <linearGradient id="grad-border" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#00e5ff;stop-opacity:0.6"/>
    <stop offset="50%" style="stop-color:#bf5af2;stop-opacity:0.6"/>
    <stop offset="100%" style="stop-color:#39d353;stop-opacity:0.6"/>
  </linearGradient>
  <clipPath id="text-reveal">
    <rect x="0" y="0" width="860" height="320">
      <animate attributeName="width" from="0" to="860" dur="1.5s" begin="0.3s" fill="freeze"/>
    </rect>
  </clipPath>
</defs>

<style>
  @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
  @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
  @keyframes glitch1 {
    0%, 90%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    92% { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 0); }
    94% { clip-path: inset(50% 0 20% 0); transform: translate(3px, 0); }
    96% { clip-path: inset(10% 0 70% 0); transform: translate(-2px, 0); }
    98% { clip-path: inset(70% 0 10% 0); transform: translate(2px, 0); }
  }
  @keyframes glitch2 {
    0%, 90%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
    91% { clip-path: inset(60% 0 10% 0); transform: translate(4px, 0); }
    93% { clip-path: inset(10% 0 50% 0); transform: translate(-4px, 0); }
    95% { clip-path: inset(40% 0 30% 0); transform: translate(2px, 0); }
    97% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 0); }
  }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(320px); }
  }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
  @keyframes dash { to { stroke-dashoffset: 0; } }
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes typing {
    0% { width: 0; }
    100% { width: 520px; }
  }
  @keyframes float1 {
    0%, 100% { transform: translateY(0px); opacity: 0.4; }
    50% { transform: translateY(-15px); opacity: 0.8; }
  }
  @keyframes float2 {
    0%, 100% { transform: translateY(0px); opacity: 0.3; }
    50% { transform: translateY(-10px); opacity: 0.7; }
  }
  @keyframes gridPulse {
    0%, 100% { opacity: 0.03; }
    50% { opacity: 0.08; }
  }
</style>

<!-- Background -->
<rect width="860" height="320" rx="12" fill="#0d1117"/>

<!-- Animated grid -->
<g style="animation: gridPulse 4s ease-in-out infinite;">
  <line x1="0" y1="40" x2="860" y2="40" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="80" x2="860" y2="80" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="120" x2="860" y2="120" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="160" x2="860" y2="160" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="200" x2="860" y2="200" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="240" x2="860" y2="240" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="280" x2="860" y2="280" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="0" x2="100" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="0" x2="200" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="300" y1="0" x2="300" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="430" y1="0" x2="430" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="560" y1="0" x2="560" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="660" y1="0" x2="660" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
  <line x1="760" y1="0" x2="760" y2="320" stroke="#30363d" stroke-width="0.5" opacity="0.2"/>
</g>

<!-- Floating particles -->
<circle cx="80" cy="60" r="2" fill="#00e5ff" opacity="0" style="animation: float1 3s 0.5s ease-in-out infinite;"/>
<circle cx="780" cy="50" r="1.5" fill="#bf5af2" opacity="0" style="animation: float2 4s 1s ease-in-out infinite;"/>
<circle cx="150" cy="260" r="1.8" fill="#39d353" opacity="0" style="animation: float1 3.5s 0.8s ease-in-out infinite;"/>
<circle cx="700" cy="270" r="2" fill="#00e5ff" opacity="0" style="animation: float2 3s 1.5s ease-in-out infinite;"/>
<circle cx="400" cy="40" r="1.5" fill="#ff7b72" opacity="0" style="animation: float1 4s 0.3s ease-in-out infinite;"/>
<circle cx="600" cy="280" r="1.8" fill="#bf5af2" opacity="0" style="animation: float2 3.5s 2s ease-in-out infinite;"/>
<circle cx="250" cy="100" r="1" fill="#39d353" opacity="0" style="animation: float1 4.5s 1.2s ease-in-out infinite;"/>
<circle cx="550" cy="90" r="1.2" fill="#00e5ff" opacity="0" style="animation: float2 3s 0.7s ease-in-out infinite;"/>

<!-- Corner decorations -->
<path d="M12,2 L60,2" stroke="#00e5ff" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.5s forwards;"/>
<path d="M2,12 L2,60" stroke="#00e5ff" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.5s forwards;"/>
<path d="M800,2 L848,2" stroke="#bf5af2" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.7s forwards;"/>
<path d="M858,12 L858,60" stroke="#bf5af2" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.7s forwards;"/>
<path d="M12,318 L60,318" stroke="#39d353" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.9s forwards;"/>
<path d="M2,260 L2,308" stroke="#39d353" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 0.9s forwards;"/>
<path d="M800,318 L848,318" stroke="#ff7b72" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 1.1s forwards;"/>
<path d="M858,260 L858,308" stroke="#ff7b72" stroke-width="2" opacity="0.5" stroke-dasharray="48" stroke-dashoffset="48" style="animation: dash 1s 1.1s forwards;"/>

<!-- Main name - Glitch layer 1 (red) -->
<text x="430" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#ff7b72" opacity="0.7"
  style="animation: glitch1 3s 1s infinite;">AFNAAN AHMED P</text>

<!-- Main name - Glitch layer 2 (cyan) -->
<text x="430" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#00e5ff" opacity="0.7"
  style="animation: glitch2 3s 1s infinite;">AFNAAN AHMED P</text>

<!-- Main name - Base layer -->
<text x="430" y="130" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#e6edf3" filter="url(#glow)"
  opacity="0" style="animation: fadeIn 1s 0.5s forwards;">AFNAAN AHMED P</text>

<!-- Decorative line under name -->
<rect x="230" y="145" width="400" height="2" rx="1" fill="url(#grad-cyan)" opacity="0" style="animation: fadeIn 0.5s 1.2s forwards;"/>

<!-- Subtitle with typewriter -->
<g opacity="0" style="animation: fadeIn 0.5s 1.5s forwards;">
  <rect x="170" y="165" width="0" height="30" fill="transparent">
    <animate attributeName="width" from="0" to="520" dur="2s" begin="1.5s" fill="freeze"/>
  </rect>
  <text x="430" y="188" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#8b949e" clip-path="url(#text-reveal)">
    AI / ML Engineer  •  Backend Developer  •  Software Engineer
  </text>
  <!-- Blinking cursor -->
  <rect x="690" y="170" width="2" height="20" fill="#00e5ff" style="animation: blink 1s step-end infinite;">
    <animate attributeName="x" from="170" to="690" dur="2s" begin="1.5s" fill="freeze"/>
  </rect>
</g>

<!-- Bottom status bar -->
<g opacity="0" style="animation: slideUp 0.5s 2.5s forwards;">
  <text x="30" y="275" font-family="'Courier New', monospace" font-size="12" fill="#39d353">●</text>
  <text x="45" y="275" font-family="'Courier New', monospace" font-size="11" fill="#8b949e">VIT Chennai — MTech Integrated, Software Engineering (2022-27)</text>
  <text x="30" y="295" font-family="'Courier New', monospace" font-size="12" fill="#00e5ff">●</text>
  <text x="45" y="295" font-family="'Courier New', monospace" font-size="11" fill="#8b949e">Research Intern @ CHAIR  |  Core Member, Cybersecurity Div @ MIC</text>
</g>

<!-- Scanline effect -->
<rect x="0" y="0" width="860" height="3" fill="url(#grad-cyan)" opacity="0.08" style="animation: scanline 4s linear infinite;"/>

<!-- Border -->
<rect width="860" height="320" rx="12" fill="none" stroke="url(#grad-border)" stroke-width="1.5" opacity="0.5"/>
</svg>
